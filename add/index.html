<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance System SQL Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Attendance System SQL Editor</h2>

    <!-- File Loader -->
    <div class="file-input">
      <label>Upload schema.sql</label>
      <input type="file" id="fileInput">
    </div>

    <!-- Persons -->
    <div class="form-section">
      <h3>Insert into Persons</h3>
      <label>Name</label><input type="text" id="p_name">
      <label>ID Number</label><input type="text" id="p_id_number">
      <label>RFID Tag</label><input type="text" id="p_rfid">
      <label>Role</label>
      <select id="p_role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
      <button onclick="addPerson()">Add Person</button>
    </div>

    <!-- Sections -->
    <div class="form-section">
      <h3>Insert into Sections</h3>
      <label>Section Name</label><input type="text" id="s_name">
      <button onclick="addSection()">Add Section</button>
    </div>

    <!-- Student Sections -->
    <div class="form-section">
      <h3>Insert into Student Sections</h3>
      <label>Person ID</label><input type="number" id="ss_pid">
      <label>Section ID</label><input type="number" id="ss_sid">
      <button onclick="addStudentSection()">Add Student-Section</button>
    </div>

    <!-- Teacher Sections -->
    <div class="form-section">
      <h3>Insert into Teacher Sections</h3>
      <label>Person ID</label><input type="number" id="ts_pid">
      <label>Section ID</label><input type="number" id="ts_sid">
      <button onclick="addTeacherSection()">Add Teacher-Section</button>
    </div>

    <!-- Classrooms -->
    <div class="form-section">
      <h3>Insert into Classrooms</h3>
      <label>Room Number</label><input type="text" id="c_room">
      <button onclick="addClassroom()">Add Classroom</button>
    </div>

    <!-- Schedule -->
    <div class="form-section">
      <h3>Insert into Schedule</h3>
      <label>Section ID</label><input type="number" id="sch_sid">
      <label>Teacher ID</label><input type="number" id="sch_tid">
      <label>Classroom ID</label><input type="number" id="sch_cid">
      <label>Day of Week</label>
      <select id="sch_day">
        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
        <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
      </select>
      <label>Start Time</label><input type="time" id="sch_start">
      <label>End Time</label><input type="time" id="sch_end">
      <button onclick="addSchedule()">Add Schedule</button>
    </div>

    <!-- Attendance -->
    <div class="form-section">
      <h3>Insert into Attendance</h3>
      <label>Person ID</label><input type="number" id="a_pid">
      <label>Classroom ID</label><input type="number" id="a_cid">
      <label>Timestamp</label><input type="datetime-local" id="a_time">
      <button onclick="addAttendance()">Add Attendance</button>
    </div>

    <!-- Download -->
    <button onclick="downloadFile()">Download Updated schema.sql</button>
    <div class="output" id="output"></div>
  </div>
  
  <script src="index.js"></script>
</body>
</html>
